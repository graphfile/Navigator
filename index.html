<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dynamic File Tree</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/vis-network.min.css" rel="stylesheet"/>

<style>
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}
body {
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.top-container {
    display: flex;
    flex-direction: row;
    height: 55%;
}
#file-list {
    width: 200px;
    overflow: auto;
    padding: 10px;
    background: #f0f0f0;
    font-size: 28px;
    border-right: 1px solid #d3d3d3;
}
.file-item {
    margin: 5px 0;
    cursor: pointer;
    font-weight: bold;
    padding: 2px 5px;
}
.file-item:hover { color: blue; }
#network { flex: 1; }
#bottom-container {
    height: 45%;
    display: flex;
    flex-direction: column;
    border-top: 1px solid #d3d3d3;
}
#code-view {
    flex: 1;
    overflow: auto;
    font-family: monospace;
    font-size: 42px;
    white-space: pre;
    outline: none;
    position: relative;
    background: #fff;
    border: 3px solid #d3d3d3;
    box-sizing: border-box;
    padding: 10px;
}
#code-view[contenteditable="true"] { cursor: text; }
#button-bar {
    height: 80px;
    display: flex;
    align-items: center;
    padding: 5px 10px;
    background: #ddd;
    border-top: 1px solid #d3d3d3;
}
.button {
    height: 60px;
    font-size: 32px;
    margin-right: 10px;
    cursor: pointer;
    padding: 0 15px;
}
#search-box {
    height: 60px;
    font-size: 32px;
    padding: 0 10px;
    flex: 1;
}
</style>
</head>

<body>

<div class="top-container">
    <div id="file-list"></div>
    <div id="network"></div>
</div>

<div id="bottom-container">
    <div id="code-view" contenteditable="true"></div>
    <div id="button-bar">
        <button id="save-btn" class="button">Save</button>
        <button id="new-btn" class="button">New</button>
        <button id="delete-btn" class="button">Delete</button>
        <button id="rename-btn" class="button">Rename</button>
        <input type="text" id="search-box" placeholder="Search child nodes or files...">
    </div>
</div>

<script>
var nodes = new vis.DataSet([
    {
        "id": 0,
        "label": "Main",
        "x": 400,
        "y": 300,
        "fixed": {"x": true, "y": true},
        "shape": "ellipse",
        "size": 100,
        "font": {"size": 42, "face": "Arial"},
        "color": {
            "background": "#FFFFFF",
            "border": "#000000",
            "highlight": {"background": "#FFFFFF", "border": "#000000"},
            "hover": {"background": "#FFFFFF", "border": "#000000"}
        },
        "fullPath": ""
    }
]);
var edges = new vis.DataSet([]);
var mainNodeId = 0;
var selectedNodeId = mainNodeId;
var currentFile = "";
var currentPath = "";
var centerY = 300;
var rightStartX = 700;
var leftSiblingX = 125;
var spacing = 70;

var network = new vis.Network(
    document.getElementById('network'),
    { nodes: nodes, edges: edges },
    {
        physics: false,
        interaction: {
            dragNodes: false,
            dragView: true,
            zoomView: true
        }
    }
);

var codeView = document.getElementById('code-view');
var searchBox = document.getElementById('search-box');

// --------------------------
// Load file list
// --------------------------
function loadFileList(path = "") {
    currentPath = path;
    fetch('file_list.php?path=' + encodeURIComponent(path) + '&_=' + new Date().getTime())
        .then(resp => resp.json())
        .then(files => {
            var container = document.getElementById('file-list');
            container.innerHTML = '';
            files.forEach(f => {
                var div = document.createElement('div');
                div.className = 'file-item';
                div.innerText = f;
                div.onclick = function() {
                    if(f === '../') {
                        let parts = currentPath.split('/');
                        parts.pop();
                        let newPath = parts.join('/');
                        codeView.innerText = "";
                        currentFile = "";
                        nodes.update({ id: mainNodeId, label: newPath ? newPath.split('/').pop() : 'Main', fullPath: newPath });
                        var childIds = nodes.getIds().filter(id => id !== mainNodeId);
                        childIds.forEach(id => nodes.remove(id));
                        edges.clear();
                        loadFileList(newPath);
                    } else if(f.endsWith('/')) {
                        let newPath = path ? path + '/' + f.slice(0,-1) : f.slice(0,-1);
                        codeView.innerText = "";
                        currentFile = "";
                        nodes.update({ id: mainNodeId, label: f.slice(0,-1), fullPath: newPath });
                        var childIds = nodes.getIds().filter(id => id !== mainNodeId);
                        childIds.forEach(id => nodes.remove(id));
                        edges.clear();
                        loadFileList(newPath);
                    } else {
                        var fullFilePath = path ? path + '/' + f : f;
                        nodes.update({ id: mainNodeId, label: f, fullPath: fullFilePath });
                        loadFileAndNodes(fullFilePath);
                    }
                };
                container.appendChild(div);
            });
            refreshSearch();
        })
        .catch(() => {
            document.getElementById('file-list').innerText = "Failed to load file list";
        });
}

// --------------------------
// Load file + nodes
// --------------------------
function loadFileAndNodes(filename){
    fetch(filename + '?' + new Date().getTime())
        .then(resp => resp.text())
        .then(text => {
            codeView.innerText = text;
            currentFile = filename;
            nodes.update({ id: mainNodeId, label: filename.split('/').pop(), fullPath: filename });
            var existing = nodes.getIds().filter(id => id !== mainNodeId);
            existing.forEach(id => nodes.remove(id));
            edges.clear();

            var lines = text.split('\n').filter(l => l.trim().startsWith('#'));
            var total = lines.length;
            var radius = 250; // distance from main node

            lines.forEach((line, i) => {
                var cleanLabel = line.replace(/^#/, '').trim();
                var id = i + 1;

                // Circular layout
                var angle = (2 * Math.PI / total) * i;
                var xPos = 400 + radius * Math.cos(angle);
                var yPos = centerY + radius * Math.sin(angle);

                nodes.add({
                    id: id,
                    label: cleanLabel,
                    x: xPos,
                    y: yPos,
                    fixed: {x: true, y: true},
                    shape: 'ellipse',
                    size: 85,
                    font: {size: 42, face: "Arial"},
                    color: {
                        background: '#FFFFFF',
                        border: '#000000',
                        highlight: {background: '#FFFFFF', border: '#000000'},
                        hover: {background: '#FFFFFF', border: '#000000'}
                    }
                });
                edges.add({ from: mainNodeId, to: id });
            });
            refreshSearch();
        })
        .catch(() => codeView.innerText = "Failed to load " + filename);
}

// --------------------------
// Node click
// --------------------------
network.on('click', function(params) {
    if(params.nodes.length === 0) return;
    var node = params.nodes[0];

    if(node === mainNodeId) {
        selectedNodeId = mainNodeId;
        var nodeData = nodes.get(mainNodeId);
        if(nodeData.fullPath && nodeData.fullPath !== "Main") {
            loadFileAndNodes(nodeData.fullPath);
        }
        return;
    }

    selectedNodeId = node;
    var nodeData = nodes.get(node);

    nodes.update({ id: node, color: { background: '#FFFFFF', border: '#000000', highlight: {background: '#FFFFFF', border: '#000000'}, hover: {background: '#FFFFFF', border: '#000000'} } });

    var mainData = nodes.get(mainNodeId);
    if(mainData.fullPath) {
        var mainDir = mainData.fullPath.split('/').slice(0,-1).join('/');
        var childFilePath = mainDir ? mainDir + '/' + nodeData.label : nodeData.label;
        fetch(childFilePath + '?' + new Date().getTime())
            .then(resp => {
                if(!resp.ok) throw new Error("File not found");
                return resp.text();
            })
            .then(text => {
                codeView.innerText = text;
                currentFile = childFilePath;
            })
            .catch(() => codeView.innerText = "Failed to load " + childFilePath);
    }
});

// --------------------------
// Rename, New, Delete, Save buttons (unchanged)
// --------------------------
document.getElementById('rename-btn').onclick = function() {
    if(selectedNodeId === null) return;
    var nodeData = nodes.get(selectedNodeId);
    var oldName = nodeData.label;
    var newName = prompt("Enter new name:", oldName);
    if(!newName || newName.trim() === "" || newName === oldName) return;
    var fullPath = nodeData.fullPath || (currentPath ? currentPath + '/' + oldName : oldName);
    fetch('rename_file.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ oldPath: fullPath, newName: newName })
    })
    .then(resp => resp.json())
    .then(result => {
        if(result.success){
            var newFullPath = fullPath.split('/').slice(0,-1).join('/');
            newFullPath = newFullPath ? newFullPath + '/' + newName : newName;
            nodes.update({ id: selectedNodeId, label: newName, fullPath: newFullPath });
            if(selectedNodeId === mainNodeId) loadFileList(currentPath);
            refreshSearch();
        } else {
            alert("Rename failed: " + result.error);
        }
    })
    .catch(err => alert("Rename error: " + err));
};

document.getElementById('new-btn').onclick = function() {
    let fileName = prompt("Enter new file name:");
    if(!fileName || fileName.trim() === "") return;
    fileName = fileName.trim();
    if(!fileName.includes('.')) fileName += ".txt";
    let fullPath = currentPath ? currentPath + '/' + fileName : fileName;
    fetch('create_file.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: fullPath })
    })
    .then(resp => resp.json())
    .then(result => {
        if(result.success){ loadFileList(currentPath); }
        else { alert("Failed to create file: " + result.error); }
    })
    .catch(err => alert("Error creating file: " + err));
};

document.getElementById('delete-btn').onclick = function() {
    if(selectedNodeId === null) return;
    var nodeData = nodes.get(selectedNodeId);
    var fullPath = nodeData.fullPath || (currentPath ? currentPath + '/' + nodeData.label : nodeData.label);
    if(!confirm("Are you sure you want to delete '" + nodeData.label + "'?")) return;
    fetch('delete_file.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: fullPath })
    })
    .then(resp => resp.json())
    .then(result => {
        if(result.success) {
            nodes.remove(selectedNodeId);
            if(selectedNodeId === mainNodeId) {
                codeView.innerText = "";
                currentFile = "";
                loadFileList(currentPath);
            }
            selectedNodeId = mainNodeId;
        } else { alert("Delete failed: " + result.error); }
    })
    .catch(err => alert("Delete error: " + err));
};

document.getElementById('save-btn').onclick = function() {
    if(!currentFile) { alert("No file selected to save."); return; }
    fetch('save_file.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: currentFile, content: codeView.innerText })
    })
    .then(resp => resp.json())
    .then(result => {
        if(result.success){ alert("File saved successfully!"); }
        else { alert("Save failed: " + result.error); }
    })
    .catch(err => alert("Save error: " + err));
};

// --------------------------
// Search / highlight refresh
// --------------------------
function refreshSearch() {
    let query = searchBox.value.trim().toLowerCase();
    var allNodes = nodes.get();
    var fileItems = document.querySelectorAll('#file-list .file-item');

    allNodes.forEach(n => {
        nodes.update({ id: n.id, color: { background: '#FFFFFF', border: '#000000', highlight: {background:'#FFFFFF',border:'#000000'}, hover:{background:'#FFFFFF',border:'#000000'} }, size: n.id === mainNodeId ? 100 : 85 });
    });
    fileItems.forEach(div => { div.style.background = 'none'; });

    if(!query) return;

    allNodes.forEach(n => {
        if(n.label.toLowerCase().includes(query)){
            nodes.update({ id: n.id, color: { background:'#FFA500', border:'#000000', highlight:{background:'#FFA500', border:'#000000'}, hover:{background:'#FFA500', border:'#000000'} }, size: n.id === mainNodeId ? 120 : 120 });
        }
    });

    fileItems.forEach(div => {
        let fileName = div.innerText;
        let isFolder = fileName.endsWith('/');

        if(!isFolder){
            fetch(currentPath ? currentPath + '/' + fileName : fileName)
                .then(resp=>resp.text())
                .then(text=>{
                    if(fileName.toLowerCase().includes(query) || text.toLowerCase().includes(query)){
                        div.style.background = '#FFA500';
                        allNodes.forEach(n=>{ if(n.label === fileName) nodes.update({ id:n.id, color:{background:'#FFA500',border:'#000000',highlight:{background:'#FFA500',border:'#000000'},hover:{background:'#FFA500',border:'#000000'} }, size: n.id===mainNodeId?120:120 }); });
                    }
                }).catch(()=>{});
        }

        if(isFolder){
            let folderPath = currentPath ? currentPath + '/' + fileName.slice(0,-1) : fileName.slice(0,-1);
            fetch('file_list.php?path=' + encodeURIComponent(folderPath) + '&_=' + new Date().getTime())
                .then(resp=>resp.json())
                .then(filesInFolder=>{
                    filesInFolder.forEach(fileInFolder=>{
                        if(fileInFolder==='..') return;
                        let filePath = folderPath + '/' + fileInFolder;
                        fetch(filePath + '?' + new Date().getTime())
                            .then(resp=>resp.text())
                            .then(text=>{
                                if(text.toLowerCase().includes(query)){
                                    div.style.background = '#FFA500';
                                    allNodes.forEach(n=>{ if(n.label === fileInFolder) nodes.update({ id:n.id, color:{background:'#FFA500',border:'#000000',highlight:{background:'#FFA500',border:'#000000'},hover:{background:'#FFA500',border:'#000000'} }, size: n.id===mainNodeId?120:120 }); });
                                }
                            }).catch(()=>{});
                    });
                }).catch(()=>{});
        }
    });
}

searchBox.addEventListener('keyup', function(){
    clearTimeout(window.searchTimer);
    window.searchTimer = setTimeout(refreshSearch, 250);
});

window.onload = function(){ loadFileList(); };
</script>

</body>
</html>
